  <body>
    <div id="root"></div>
    <!-- GitHub Pages SPA redirect: restore path from 404 redirect -->
    <script>
      (function() {
        var pathSegmentsToKeep = 1; // Keep '/watermark'
        var l = window.location;
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, pathSegmentsToKeep + 1) +
            decoded +
            l.hash
          );
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
